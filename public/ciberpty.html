<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CiberPTY · Cybersecurity & Automation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050608;
    --bg-soft: #0a0d12;
    --bg-elev: #0e1218;
    --panel: #0c1117;
    --panel-line: #1a2230;
    --line: #1c2532;
    --text: #e6edf3;
    --muted: #7d8a9a;
    --dim: #4a5568;
    --accent: #00ff9c;       /* primary green */
    --accent-glow: #00ff9c;
    --warn: #ffb547;
    --crit: #ff4d6d;
    --info: #4cc9ff;
    --magenta: #d946ef;
    --grid-line: rgba(0, 255, 156, 0.06);
    --scanline: rgba(0, 255, 156, 0.025);
    --shadow-soft: 0 30px 80px rgba(0,0,0,0.4);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --serif: 'Instrument Serif', Georgia, serif;
  }

  html[data-theme='light'] {
    --bg: #f4f6f8;
    --bg-soft: #eaeef2;
    --bg-elev: #ffffff;
    --panel: #ffffff;
    --panel-line: #d8dee6;
    --line: #cfd6e0;
    --text: #0a0d12;
    --muted: #4a5568;
    --dim: #94a3b8;
    --accent: #00875c;
    --accent-glow: #00b377;
    --warn: #c97a00;
    --crit: #d6336c;
    --info: #0070d2;
    --magenta: #a21caf;
    --grid-line: rgba(0,135,92,0.07);
    --scanline: rgba(0,0,0,0.015);
    --shadow-soft: 0 30px 80px rgba(10,13,18,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--mono);
    color: var(--text);
    background: var(--bg);
    line-height: 1.55;
    overflow-x: hidden;
    cursor: none;
  }

  /* ---------- crosshair cursor ---------- */
  .crosshair {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transition: opacity 0.2s ease;
  }
  .crosshair-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9999;
    transition: width 0.18s ease, height 0.18s ease, border-color 0.18s ease, background 0.18s ease, opacity 0.2s ease;
    box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  .crosshair-dot {
    position: fixed;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 0 8px var(--accent);
  }
  .crosshair-tick {
    position: fixed;
    width: 1px;
    background: var(--accent);
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }
  body.is-hovering .crosshair-ring {
    width: 56px; height: 56px;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
  }
  @media (max-width: 800px), (pointer: coarse) {
    body { cursor: auto; }
    .crosshair-ring, .crosshair-dot, .crosshair-tick { display: none !important; }
  }

  /* ---------- canvas backgrounds ---------- */
  #matrix-canvas {
    position: fixed; inset: 0;
    z-index: 0; pointer-events: none;
    opacity: 0.35;
  }
  html[data-theme='light'] #matrix-canvas { opacity: 0.18; }

  .grid-bg {
    position: fixed; inset: 0;
    z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 30%, transparent 80%);
  }
  .scanlines {
    position: fixed; inset: 0;
    z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, var(--scanline) 2px, var(--scanline) 3px);
    mix-blend-mode: overlay;
  }
  .vignette {
    position: fixed; inset: 0;
    z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%);
  }
  html[data-theme='light'] .vignette { background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.06) 100%); }

  /* ---------- layout ---------- */
  .container {
    width: min(1280px, 92vw);
    margin-inline: auto;
  }

  .site {
    position: relative;
    z-index: 2;
  }

  /* ---------- header ---------- */
  .site-header {
    position: sticky; top: 0;
    z-index: 50;
    backdrop-filter: blur(16px);
    background: color-mix(in srgb, var(--bg) 75%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    gap: 1rem;
  }
  .brand {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: var(--display);
    font-weight: 700;
    letter-spacing: -0.02em;
    font-size: 1.05rem;
    color: var(--text);
    text-decoration: none;
  }
  .brand-mark {
    width: 28px; height: 28px;
    display: grid; place-items: center;
  }
  .brand-mark svg { width: 100%; height: 100%; }
  .brand-name { display: flex; align-items: baseline; gap: 0.35rem; }
  .brand-suffix { color: var(--accent); font-family: var(--mono); font-weight: 500; font-size: 0.75rem; }
  .nav-links {
    display: none; gap: 1.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
  }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    position: relative;
    padding: 0.4rem 0;
    transition: color 0.18s;
  }
  .nav-links a::before {
    content: '> ';
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.18s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::before { opacity: 1; }
  .nav-actions { display: flex; align-items: center; gap: 0.5rem; }
  .pill-btn {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 0.4rem 0.7rem;
    border-radius: 999px;
    cursor: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: border-color 0.18s, background 0.18s;
    display: inline-flex; align-items: center; gap: 0.4rem;
  }
  .pill-btn:hover {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  @media (min-width: 900px) {
    .nav-links { display: inline-flex; }
  }

  /* ---------- hero ---------- */
  .hero {
    padding: clamp(2rem, 6vw, 4rem) 0 clamp(3rem, 8vw, 6rem);
    position: relative;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
    align-items: center;
  }
  @media (min-width: 1024px) {
    .hero-grid { grid-template-columns: 1.1fr 0.9fr; gap: 3rem; }
  }

  .hero-meta-line {
    display: flex; align-items: center; gap: 0.75rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 1.5rem;
  }
  .hero-meta-line .bracket { color: var(--accent); }
  .hero-meta-line .sep { color: var(--dim); }

  .hero-title {
    font-family: var(--display);
    font-size: clamp(2.5rem, 7vw, 5.6rem);
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.035em;
    margin: 0;
    color: var(--text);
  }
  .hero-title .glitch {
    color: var(--accent);
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
  }
  .hero-title .strike {
    position: relative;
    display: inline-block;
  }
  .hero-title .strike::after {
    content: '';
    position: absolute; left: 0; right: 0;
    top: 52%;
    height: 3px;
    background: var(--crit);
    transform: scaleX(0);
    transform-origin: left;
    animation: strikeIn 1.2s ease-out 0.6s forwards;
  }
  @keyframes strikeIn {
    to { transform: scaleX(1); }
  }

  .hero-tagline {
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: clamp(0.95rem, 1.4vw, 1.05rem);
    color: var(--muted);
    max-width: 56ch;
    line-height: 1.65;
  }

  .hero-cta {
    margin-top: 2rem;
    display: flex; flex-wrap: wrap;
    gap: 0.8rem;
  }

  .btn {
    border-radius: 4px;
    padding: 0.85rem 1.3rem;
    font-family: var(--mono);
    font-size: 0.82rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid var(--line);
    cursor: none;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.6rem;
    transition: all 0.18s ease;
    background: transparent;
    color: var(--text);
  }
  .btn-primary {
    background: var(--accent);
    color: #050608;
    border-color: var(--accent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent),
                0 8px 24px color-mix(in srgb, var(--accent) 25%, transparent);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent),
                0 12px 32px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-arrow {
    transition: transform 0.18s ease;
  }
  .btn:hover .btn-arrow { transform: translateX(3px); }

  .hero-stats {
    margin-top: 2.5rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    padding: 1.25rem 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .stat-num {
    font-family: var(--display);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 0.66rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  /* ---------- terminal ---------- */
  .terminal {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 8px;
    overflow: hidden;
    font-family: var(--mono);
    font-size: 0.82rem;
    box-shadow: var(--shadow-soft);
    position: relative;
  }
  .terminal-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.55rem 0.85rem;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--panel-line);
  }
  .terminal-dots { display: flex; gap: 0.4rem; }
  .terminal-dot { width: 11px; height: 11px; border-radius: 50%; }
  .terminal-dot.r { background: #ff5f56; }
  .terminal-dot.y { background: #ffbd2e; }
  .terminal-dot.g { background: #27c93f; }
  .terminal-title {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .terminal-status {
    font-size: 0.65rem;
    color: var(--accent);
    display: flex; align-items: center; gap: 0.35rem;
  }
  .terminal-body {
    padding: 1rem 1.1rem 1.2rem;
    min-height: 380px;
    background:
      linear-gradient(180deg, transparent 0%, rgba(0,255,156,0.02) 100%),
      var(--panel);
  }
  .terminal-line { margin: 0.15rem 0; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .term-prompt { color: var(--accent); }
  .term-host { color: var(--info); }
  .term-cmd { color: var(--text); }
  .term-out { color: var(--muted); }
  .term-warn { color: var(--warn); }
  .term-ok { color: var(--accent); }
  .term-crit { color: var(--crit); }
  .term-dim { color: var(--dim); }
  .blink-cursor {
    display: inline-block;
    width: 8px; height: 1em;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .terminal-input {
    display: flex; align-items: center; gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .terminal-input input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    cursor: none;
  }

  /* ---------- section heading ---------- */
  .section { padding: clamp(3rem, 6vw, 5rem) 0; }
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
    margin-bottom: 2.5rem;
    border-bottom: 1px dashed var(--line);
    padding-bottom: 1.25rem;
  }
  .section-eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-eyebrow::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--accent);
  }
  .section-title {
    font-family: var(--display);
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin: 0.5rem 0 0;
    max-width: 24ch;
  }
  .section-title em {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .section-meta {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ---------- about + ops grid ---------- */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
  }
  @media (min-width: 900px) {
    .about-grid { grid-template-columns: 0.9fr 1.1fr; gap: 3rem; }
  }
  .about-text p {
    font-size: 1.05rem;
    color: var(--text);
    margin: 0 0 1rem;
    line-height: 1.65;
    font-family: var(--mono);
  }
  .about-text p:first-of-type {
    font-family: var(--display);
    font-size: clamp(1.2rem, 1.8vw, 1.5rem);
    line-height: 1.35;
    color: var(--text);
  }
  .about-text p:first-of-type::first-letter {
    font-family: var(--serif);
    font-style: italic;
    font-size: 3.2rem;
    line-height: 0.85;
    float: left;
    margin: 0.2rem 0.5rem 0 -0.05rem;
    color: var(--accent);
  }

  /* ---------- shield panel ---------- */
  .shield-panel {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    min-height: 480px;
    display: flex; flex-direction: column;
  }
  .shield-panel-head {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 0.85rem;
    margin-bottom: 1rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .shield-panel-stage {
    flex: 1;
    position: relative;
    display: grid; place-items: center;
    min-height: 320px;
  }
  .shield-svg-wrap {
    width: 100%;
    max-width: 380px;
    aspect-ratio: 1;
    position: relative;
  }
  .shield-svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 30px color-mix(in srgb, var(--accent) 40%, transparent));
    animation: shieldFloat 6s ease-in-out infinite;
  }
  @keyframes shieldFloat {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-8px) rotate(0.5deg); }
  }
  .shield-rotate-1 { animation: rotateSlow 22s linear infinite; transform-origin: center; }
  .shield-rotate-2 { animation: rotateSlow 16s linear infinite reverse; transform-origin: center; }
  @keyframes rotateSlow { to { transform: rotate(360deg); } }
  .shield-pulse-ring {
    position: absolute; inset: 0;
    border: 1px solid var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: pulseRing 3s ease-out infinite;
  }
  .shield-pulse-ring:nth-child(2) { animation-delay: 1s; }
  .shield-pulse-ring:nth-child(3) { animation-delay: 2s; }
  @keyframes pulseRing {
    0% { transform: scale(0.85); opacity: 0.7; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  .shield-readout {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--panel-line);
  }
  .readout-cell {
    font-family: var(--mono);
  }
  .readout-label {
    font-size: 0.64rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .readout-value {
    font-size: 0.95rem;
    color: var(--text);
    margin-top: 0.15rem;
    font-variant-numeric: tabular-nums;
  }
  .readout-value.ok { color: var(--accent); }
  .readout-value.warn { color: var(--warn); }

  /* ---------- services ---------- */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  @media (min-width: 700px) {
    .services-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1100px) {
    .services-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .service-card {
    background: var(--bg);
    padding: 2rem 1.75rem;
    position: relative;
    overflow: hidden;
    transition: background 0.3s ease;
    cursor: none;
  }
  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.5s ease;
  }
  .service-card:hover::before { transform: scaleX(1); }
  .service-card:hover { background: var(--bg-soft); }
  .service-card:hover .service-glitch {
    animation: glitch 0.4s steps(2) 1;
  }
  @keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(2px, -1px); }
    60% { transform: translate(-1px, 2px); }
    80% { transform: translate(1px, -2px); }
  }
  .service-num {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .service-icon {
    width: 36px; height: 36px;
    color: var(--accent);
    margin-bottom: 1rem;
  }
  .service-icon svg { width: 100%; height: 100%; }
  .service-title {
    font-family: var(--display);
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0 0 0.6rem;
    letter-spacing: -0.015em;
    line-height: 1.15;
  }
  .service-desc {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    margin: 0 0 1.25rem;
  }
  .service-stack {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
    margin-bottom: 1.25rem;
  }
  .stack-tag {
    font-family: var(--mono);
    font-size: 0.66rem;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.2rem 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .service-link {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: gap 0.2s ease;
  }
  .service-link:hover { gap: 0.7rem; }
  .service-link::before { content: '→'; }

  /* ---------- ops dashboard / globe ---------- */
  .ops-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  @media (min-width: 900px) {

  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  <script type="text/babel" data-source="effects.jsx">
// Visual effects: matrix rain, attack globe, crosshair cursor

function initMatrixRain() {
  const canvas = document.getElementById('matrix-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, cols, drops;
  const chars = '01ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃ#$%&*+=<>?@/\\|';

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cols = Math.floor(w / 18);
    drops = Array(cols).fill(0).map(() => Math.random() * h / 18);
  }
  resize();
  window.addEventListener('resize', resize);

  function getAccent() {
    const root = document.documentElement;
    const v = getComputedStyle(root).getPropertyValue('--accent').trim();
    return v || '#00ff9c';
  }

  let frame = 0;
  function draw() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    // slower, deeper trails
    ctx.fillStyle = isLight ? 'rgba(244,246,248,0.045)' : 'rgba(5,6,8,0.035)';
    ctx.fillRect(0, 0, w, h);
    const accent = getAccent();
    ctx.font = '15px JetBrains Mono, monospace';
    for (let i = 0; i < cols; i++) {
      // skip many columns each frame so movement is slow & sparse
      if ((i + frame) % 3 !== 0) continue;
      const ch = chars[Math.floor(Math.random() * chars.length)];
      const x = i * 18;
      const y = drops[i] * 18;
      ctx.fillStyle = accent;
      ctx.fillText(ch, x, y);
      ctx.fillStyle = isLight ? 'rgba(0,135,92,0.18)' : 'rgba(0,255,156,0.22)';
      ctx.fillText(ch, x, y - 18);

      if (y > h && Math.random() > 0.985) drops[i] = 0;
      drops[i] += 0.18;
    }
    frame++;
  }
  let raf;
  let last = 0;
  function tick(t) {
    // throttle to ~22fps for that classic Matrix cadence
    if (t - last > 45) { draw(); last = t; }
    raf = requestAnimationFrame(tick);
  }
  raf = requestAnimationFrame(tick);
}

function initAttackGlobe(canvasEl) {
  if (!canvasEl) return () => {};
  const ctx = canvasEl.getContext('2d');
  let w, h, dpr;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    const rect = canvasEl.getBoundingClientRect();
    w = rect.width;
    h = rect.height;
    canvasEl.width = w * dpr;
    canvasEl.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  const ro = new ResizeObserver(resize);
  ro.observe(canvasEl);

  // World point cloud — simplified continent sketches via lat/lon
  // We'll generate procedural dot map for landmasses using a low-res mask drawn from rectangles approximating continents.
  // Cleaner approach: random stars across mapped continents.
  const points = [];
  // approximate continent regions [latMin, latMax, lonMin, lonMax, density]
  const regions = [
    [10, 70, -130, -65, 220],   // North America
    [-55, 12, -82, -34, 180],   // South America
    [35, 70, -10, 40, 200],     // Europe
    [-35, 35, -18, 52, 260],    // Africa
    [10, 70, 30, 145, 320],     // Asia
    [-45, -10, 110, 155, 90],   // Australia
  ];
  regions.forEach(([lat0, lat1, lon0, lon1, n]) => {
    for (let i = 0; i < n; i++) {
      const lat = lat0 + Math.random() * (lat1 - lat0);
      const lon = lon0 + Math.random() * (lon1 - lon0);
      points.push({ lat, lon });
    }
  });

  // Hubs & cities (rough lat/lon)
  const cities = [
    { name: 'PA', lat: 9, lon: -79, home: true },
    { name: 'NYC', lat: 40.7, lon: -74 },
    { name: 'LDN', lat: 51.5, lon: -0.1 },
    { name: 'BER', lat: 52.5, lon: 13.4 },
    { name: 'MAD', lat: 40.4, lon: -3.7 },
    { name: 'SAO', lat: -23.5, lon: -46.6 },
    { name: 'BOG', lat: 4.7, lon: -74 },
    { name: 'LAX', lat: 34, lon: -118 },
    { name: 'TYO', lat: 35.6, lon: 139.7 },
    { name: 'SIN', lat: 1.35, lon: 103.8 },
    { name: 'SYD', lat: -33.9, lon: 151.2 },
    { name: 'JNB', lat: -26.2, lon: 28 },
    { name: 'MOS', lat: 55.7, lon: 37.6 },
    { name: 'DXB', lat: 25.2, lon: 55.3 }
  ];

  // Project equirectangular
  function project(lat, lon) {
    const x = ((lon + 180) / 360) * w;
    const y = ((90 - lat) / 180) * h;
    return [x, y];
  }

  const home = cities.find(c => c.home);
  const arcs = [];

  function spawnArc() {
    const candidates = cities.filter(c => !c.home);
    const from = candidates[Math.floor(Math.random() * candidates.length)];
    const to = home;
    const isCrit = Math.random() < 0.25;
    arcs.push({ from, to, t: 0, dur: 60 + Math.random() * 80, crit: isCrit });
    if (arcs.length > 20) arcs.shift();
  }

  const arcTimer = setInterval(spawnArc, 700);

  function getColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function draw() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const accent = getColor('--accent') || '#00ff9c';
    const crit = getColor('--crit') || '#ff4d6d';
    const dim = isLight ? 'rgba(74,85,104,0.5)' : 'rgba(125,138,154,0.4)';
    const bgFill = isLight ? '#eaeef2' : '#0a0d12';

    ctx.fillStyle = bgFill;
    ctx.fillRect(0, 0, w, h);

    // grid
    ctx.strokeStyle = isLight ? 'rgba(0,135,92,0.06)' : 'rgba(0,255,156,0.05)';
    ctx.lineWidth = 1;
    for (let lat = -60; lat <= 60; lat += 30) {
      const [, y] = project(lat, 0);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    for (let lon = -180; lon <= 180; lon += 30) {
      const [x] = project(0, lon);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }

    // continents as point cloud
    ctx.fillStyle = dim;
    points.forEach(p => {
      const [x, y] = project(p.lat, p.lon);
      ctx.fillRect(x, y, 1.2, 1.2);
    });

    // home pulse
    const [hx, hy] = project(home.lat, home.lon);
    const t = (Date.now() % 2000) / 2000;
    ctx.beginPath();
    ctx.arc(hx, hy, 2 + t * 14, 0, Math.PI * 2);
    ctx.strokeStyle = accent + '88';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(hx, hy, 3, 0, Math.PI * 2);
    ctx.fillStyle = accent;
    ctx.fill();

    // arcs
    arcs.forEach(a => {
      const [x1, y1] = project(a.from.lat, a.from.lon);
      const [x2, y2] = project(a.to.lat, a.to.lon);
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2 - Math.abs(x2 - x1) * 0.25;

      // full path faint
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(mx, my, x2, y2);
      ctx.strokeStyle = (a.crit ? crit : accent) + (isLight ? '40' : '30');
      ctx.lineWidth = 1;
      ctx.stroke();

      // animated head
      const p = Math.min(1, a.t / a.dur);
      // sample
      const px = (1-p)*(1-p)*x1 + 2*(1-p)*p*mx + p*p*x2;
      const py = (1-p)*(1-p)*y1 + 2*(1-p)*p*my + p*p*y2;
      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = a.crit ? crit : accent;
      ctx.shadowColor = a.crit ? crit : accent;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;

      // origin marker
      ctx.beginPath();
      ctx.arc(x1, y1, 1.6, 0, Math.PI * 2);
      ctx.fillStyle = (a.crit ? crit : accent) + 'cc';
      ctx.fill();

      a.t += 1;
    });

    for (let i = arcs.length - 1; i >= 0; i--) {
      if (arcs[i].t >= arcs[i].dur) arcs.splice(i, 1);
    }
  }

  let raf;
  function tick() {
    draw();
    raf = requestAnimationFrame(tick);
  }
  tick();
  return () => { cancelAnimationFrame(raf); clearInterval(arcTimer); ro.disconnect(); };
}

function initCrosshair() {
  const ring = document.getElementById('ch-ring');
  const dot = document.getElementById('ch-dot');
  const th = document.getElementById('ch-th');
  const tv = document.getElementById('ch-tv');
  if (!ring || !dot) return;
  let mx = -100, my = -100, rx = -100, ry = -100;
  function move(e) {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top = my + 'px';
  }
  window.addEventListener('mousemove', move);
  function tick() {
    rx += (mx - rx) * 0.18;
    ry += (my - ry) * 0.18;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    if (th) { th.style.left = (rx - 7) + 'px'; th.style.top = ry + 'px'; }
    if (tv) { tv.style.left = rx + 'px'; tv.style.top = (ry - 7) + 'px'; tv.style.height = '14px'; tv.style.width = '1px'; }
    requestAnimationFrame(tick);
  }
  tick();

  document.addEventListener('mouseover', e => {
    const t = e.target;
    if (t && t.closest && t.closest('a, button, [data-hover]')) {
      document.body.classList.add('is-hovering');
    }
  });
  document.addEventListener('mouseout', e => {
    const t = e.target;
    if (t && t.closest && t.closest('a, button, [data-hover]')) {
      document.body.classList.remove('is-hovering');
    }
  });
}

function initRevealOnScroll() {
  const els = Array.from(document.querySelectorAll('[data-reveal]'));
  const reveal = el => el.classList.add('visible');

  if (!('IntersectionObserver' in window)) {
    els.forEach(reveal);
    return;
  }

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        reveal(e.target);
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -10% 0px' });

  els.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight * 0.95) reveal(el);
    else obs.observe(el);
  });
}

window.initMatrixRain = initMatrixRain;
window.initAttackGlobe = initAttackGlobe;
window.initCrosshair = initCrosshair;
window.initRevealOnScroll = initRevealOnScroll;

// Interactive Terminal
const TerminalBlock = ({ lang }) => {
  const c = window.CONTENT[lang].terminal;
  const [lines, setLines] = React.useState([]);
  const [input, setInput] = React.useState('');
  const [booted, setBooted] = React.useState(false);
  const [uptime, setUptime] = React.useState(0);
  const startRef = React.useRef(Date.now());
  const inputRef = React.useRef(null);
  const bodyRef = React.useRef(null);

  React.useEffect(() => {
    const id = setInterval(() => setUptime(Math.floor((Date.now() - startRef.current)/1000)), 1000);
    return () => clearInterval(id);
  }, []);

  const fmtUp = (s) => {
    const h = String(Math.floor(s/3600)).padStart(2,'0');
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    const ss = String(s%60).padStart(2,'0');
    return `${h}:${m}:${ss}`;
  };

  // boot sequence
  React.useEffect(() => {
    let mounted = true;
    const bootLines = lang === 'es' ? [
      { cls: 'term-out', text: '[INIT] Iniciando ciberpty-os v2.4.0...' },
      { cls: 'term-out', text: '[BOOT] Cargando módulos: wazuh, n8n, suricata, falco...' },
      { cls: 'term-ok', text: '[ OK ] Conectado a SIEM · 12,840 EPS' },
      { cls: 'term-ok', text: '[ OK ] Firewall activo · 0 brechas detectadas' },
      { cls: 'term-warn', text: '[WARN] 2 alertas en triage automatizado' },
      { cls: 'term-out', text: '' },
      { cls: 'term-out', text: `Bienvenido. ${c.hint}` }
    ] : [
      { cls: 'term-out', text: '[INIT] Booting ciberpty-os v2.4.0...' },
      { cls: 'term-out', text: '[BOOT] Loading modules: wazuh, n8n, suricata, falco...' },
      { cls: 'term-ok', text: '[ OK ] SIEM connected · 12,840 EPS' },
      { cls: 'term-ok', text: '[ OK ] Firewall active · 0 breaches detected' },
      { cls: 'term-warn', text: '[WARN] 2 alerts in automated triage' },
      { cls: 'term-out', text: '' },
      { cls: 'term-out', text: `Welcome. ${c.hint}` }
    ];
    let i = 0;
    function next() {
      if (!mounted) return;
      if (i >= bootLines.length) { setBooted(true); return; }
      const line = bootLines[i];
      if (line) setLines(prev => [...prev, line]);
      i++;
      setTimeout(next, 280 + Math.random() * 180);
    }
    setTimeout(next, 400);
    return () => { mounted = false; };
  }, [lang]);

  React.useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [lines]);

  function runCmd(cmd) {
    const cmdLine = { cls: 'term-cmd', text: cmd, prompt: true };
    const args = cmd.trim().split(/\s+/);
    const c0 = (args[0] || '').toLowerCase();
    let out = [];
    if (c0 === '') {
      out = [];
    } else if (c0 === 'help' || c0 === '?') {
      out = lang === 'es' ? [
        { cls: 'term-out', text: 'Comandos disponibles:' },
        { cls: 'term-dim', text: '  status      Estado del SOC y servicios' },
        { cls: 'term-dim', text: '  scan <ip>   Escaneo de puertos simulado' },
        { cls: 'term-dim', text: '  ls          Listar capacidades' },
        { cls: 'term-dim', text: '  services    Servicios ofrecidos' },
        { cls: 'term-dim', text: '  contact     Datos de contacto' },
        { cls: 'term-dim', text: '  whoami      Identidad actual' },
        { cls: 'term-dim', text: '  uptime      Tiempo en línea' },
        { cls: 'term-dim', text: '  clear       Limpiar terminal' }
      ] : [
        { cls: 'term-out', text: 'Available commands:' },
        { cls: 'term-dim', text: '  status      SOC and services status' },
        { cls: 'term-dim', text: '  scan <ip>   Simulated port scan' },
        { cls: 'term-dim', text: '  ls          List capabilities' },
        { cls: 'term-dim', text: '  services    Offered services' },
        { cls: 'term-dim', text: '  contact     Contact details' },
        { cls: 'term-dim', text: '  whoami      Current identity' },
        { cls: 'term-dim', text: '  uptime      Time online' },
        { cls: 'term-dim', text: '  clear       Clear terminal' }
      ];
    } else if (c0 === 'status') {
      out = [
        { cls: 'term-ok', text: '● SIEM       online   12,840 EPS' },
        { cls: 'term-ok', text: '● Firewall   online   14,237 blocks/24h' },
        { cls: 'term-ok', text: '● n8n        online   42 workflows · 0 errors' },
        { cls: 'term-ok', text: '● Proxmox    online   3 nodes · HA' },
        { cls: 'term-warn', text: '● Backup     pending  next: 02:00 UTC-5' }
      ];
    } else if (c0 === 'scan') {
      const ip = args[1] || '10.0.0.1';
      out = [
        { cls: 'term-out', text: `Scanning ${ip}...` },
        { cls: 'term-dim', text: 'PORT    STATE  SERVICE' },
        { cls: 'term-ok',  text: '22/tcp  open   ssh      OpenSSH 9.2 (hardened)' },
        { cls: 'term-ok',  text: '443/tcp open   https    nginx 1.25 (TLS 1.3)' },
        { cls: 'term-dim', text: '80/tcp  closed http' },
        { cls: 'term-dim', text: '21/tcp  closed ftp' },
        { cls: 'term-out', text: `Done. ${ip} · 2 open · firewall enforced` }
      ];
    } else if (c0 === 'ls') {
      out = [
        { cls: 'term-info', text: 'capabilities/' },
        { cls: 'term-out',  text: '  blue-team/      red-team/      forensics/' },
        { cls: 'term-out',  text: '  cyber-legal/    ai-automation/ infra/' }
      ];
    } else if (c0 === 'services') {
      const svc = window.CONTENT[lang].services.items;
      out = svc.map(s => ({ cls: 'term-out', text: `${s.num.padEnd(8)} ${s.title}` }));
    } else if (c0 === 'contact') {
      out = [
        { cls: 'term-out', text: 'gilberto@ciberpty.com' },
        { cls: 'term-out', text: 'wa.me/50768573845' },
        { cls: 'term-out', text: 'github.com/cpu-16' }
      ];
    } else if (c0 === 'whoami') {
      out = [{ cls: 'term-ok', text: 'guest@ciberpty (read-only · no privileges)' }];
    } else if (c0 === 'uptime') {
      out = [{ cls: 'term-out', text: `up ${fmtUp(uptime)} · load: 0.42 0.38 0.31` }];
    } else if (c0 === 'clear') {
      setLines([]);
      return;
    } else if (c0 === 'sudo') {
      out = [{ cls: 'term-crit', text: `${args[0]}: nice try ;) — guest cannot escalate` }];
    } else if (c0 === 'rm') {
      out = [{ cls: 'term-crit', text: 'rm: operation not permitted (read-only sandbox)' }];
    } else {
      out = [{ cls: 'term-crit', text: `${c0}: command not found · try 'help'` }];
    }
    setLines(prev => [...prev, cmdLine, ...out]);
  }

  function onSubmit(e) {
    e.preventDefault();
    runCmd(input);
    setInput('');
  }

  return (
    <div className="terminal" data-hover onClick={() => inputRef.current && inputRef.current.focus()}>
      <div className="terminal-bar">
        <div className="terminal-dots">
          <span className="terminal-dot r"></span>
          <span className="terminal-dot y"></span>
          <span className="terminal-dot g"></span>
        </div>
        <div className="terminal-title">{c.title}</div>
        <div className="terminal-status">
          <span className="status-dot"></span>{c.status} · {fmtUp(uptime)}
        </div>
      </div>
      <div className="terminal-body" ref={bodyRef} style={{maxHeight: 380, overflowY: 'auto'}}>
        {lines.filter(Boolean).map((l, i) => (
          <div key={i} className="terminal-line">
            {l && l.prompt && <span className="term-prompt">guest@ciberpty:~$ </span>}
            <span className={l && l.cls}>{l && l.text}</span>
          </div>
        ))}
        {booted && (
          <form onSubmit={onSubmit} className="terminal-input">
            <span className="term-prompt">guest@ciberpty:~$</span>
            <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} autoFocus spellCheck={false} autoComplete="off"/>
            <span className="blink-cursor"></span>
          </form>
        )}
      </div>
    </div>
  );
};

};

Object.assign(window, {

  <script type="text/babel" data-source="app.jsx">
// App entry — wires together components, theme, language, tweaks panel

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "lang": "es"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const lang = tweaks.lang === 'en' ? 'en' : 'es';
  const theme = tweaks.theme === 'light' ? 'light' : 'dark';

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('lang', lang);
    document.title = lang === 'es'
      ? 'CiberPTY · Ciberseguridad & Automatización'
      : 'CiberPTY · Cybersecurity & Automation';
  }, [theme, lang]);

  React.useEffect(() => {
    window.initMatrixRain && window.initMatrixRain();
    window.initCrosshair && window.initCrosshair();
  }, []);

  // Re-init reveal on every content change
  React.useEffect(() => {
    setTimeout(() => window.initRevealOnScroll && window.initRevealOnScroll(), 60);
  }, [lang]);

  const setLang = (l) => setTweak('lang', l);
  const setTheme = (t) => setTweak('theme', t);

  return (
    <>
      <Header lang={lang} setLang={setLang} theme={theme} setTheme={setTheme}/>
      <main>
        <Hero lang={lang}/>
        <AboutSection lang={lang}/>
        <ServicesSection lang={lang}/>
        <OpsSection lang={lang}/>
        <StackSection lang={lang}/>
        <MethodSection lang={lang}/>
        <InsightsSection lang={lang}/>
        <ContactSection lang={lang}/>
      </main>
      <Footer lang={lang}/>
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Apariencia">
          <window.TweakRadio
            label="Tema"
            value={theme}
            onChange={(v) => setTheme(v)}
            options={['dark', 'light']}
          />
          <window.TweakRadio
            label="Idioma"
            value={lang}
            onChange={(v) => setLang(v)}
            options={['es', 'en']}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
